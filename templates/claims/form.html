{% extends 'base.html' %}{% block content %}<div class="page-head">
    <h1>Submit claim</h1>
</div>
<section class="panel form-card">
    <form method="post" enctype="multipart/form-data" class="form-grid">{% csrf_token %}{{ form.non_field_errors }}{% for field in form %}<label>{{ field.label }}{{ field }}{{ field.errors }}</label>{% endfor %}<button
            class="btn primary">Submit claim</button></form>
</section>{% endblock %}
