{% extends 'base.html' %}{% block content %}<div class="page-head">
    <div><span class="eyebrow">Inbox</span>
        <h1>Notifications</h1>
        <p>Approvals, payments, announcements and system updates.</p>
    </div>
    <form method="post" action="{% url 'notification_read_all' %}">{% csrf_token %}<button class="btn">Mark all
            read</button></form>
</div>
<section class="panel notification-list">{% for n in notifications %}<a
        class="notification-row {% if not n.is_read %}unread{% endif %}" href="{% url 'notification_read' n.pk %}"><span
            class="metric-icon blue">●</span>
        <div><strong>{{ n.title }}</strong>
            <p>{{ n.message }}</p><small>{{ n.created_at|timesince }} ago</small>
        </div>
    </a>{% empty %}<div class="empty-cell">No notifications.</div>{% endfor %}</section>{% endblock %}
